<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="shab barfi, snowy nights, coffee, cafe, contact, drinks">
    <meta name="description" content="Contact Snowy Nights café for orders, events, or inquiries.">
    <meta name="subject" content="coffee shop, contact">
    <meta name="url" content="https://www.shab-barfi.com">
    <title>Menu | Snowy Nights Café</title>
    <link href="style.css" rel="stylesheet" type="text/css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="heder-small" id="hdj">
        <div id="imgdiv">
            <a href="logo.html"><img src="Photo/logo.webp" id="logo"></a>
        </div>
        <div id="menudiv">
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="custom.html">Party</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
        <div id="title">Snowy Nights</div>
    </div>
    <div class="div-close" id="cl">
        <div class="close"></div>
    </div>
    <div id="filters">
        <div class="cart-icon" id="cartIcon"><img class="img-cart-icon">0</div>
        <div class="filters">
            <select id="category" class="cf">
                <option value="all">All</option>
                <option value="cold_drink">Cold drink</option>
                <option value="hot_drink">Hot drink</option>
                <option value="Dessert">Dessert</option>
            </select>
        </div>
        <div class="products" id="productList"></div>
        <div id="invoiceModal">
            <h3 id="h3s">Shopping cart</h3>
            <ul id="invoiceList"></ul>
            <p><strong>Total sum:</strong> <span id="totalPrice">0</span> euro</p>
            <button onclick="clearCart()">🗑️ Delete All</button>
            <button onclick="document.getElementById('invoiceModal').style.display='none'">❌ Close</button>
            <button onclick="">Pay</button>
        </div>
    </div>
    <script>
        const products = [
            { id: 1, name: "Espresso", category: "hot_drink", price: 2.5 },
            { id: 2, name: "Cappuccino", category: "hot_drink", price: 3.0 },
            { id: 3, name: "Latte", category: "hot_drink", price: 3.2 },
            { id: 4, name: "Americano", category: "hot_drink", price: 2.8 },
            { id: 5, name: "Iced Coffee", category: "cold_drink", price: 3.5 },
            { id: 9, name: "Cold Brew", category: "cold_drink", price: 3.5 },
            { id: 6, name: "Chocolate Cake", category: "Dessert", price: 4.5 },
            { id: 7, name: "Blueberry Muffin", category: "Dessert", price: 3.8 },
            { id: 8, name: "Cheesecake", category: "Dessert", price: 4.8 }
        ];
        let cart = [];
        const productList = document.getElementById("productList");
        const invoiceList = document.getElementById("invoiceList");
        const totalPriceEl = document.getElementById("totalPrice");
        const invoiceModal = document.getElementById("invoiceModal");
        const cartIcon = document.getElementById("cartIcon");
        const categorySelect = document.getElementById("category");
        categorySelect.addEventListener("change", () => {
            const selected = categorySelect.value;
            const filtered = selected === "all" ? products : products.filter(p => p.category === selected);
            renderProducts(filtered);
        });
        function renderProducts(productArray) {
            productList.innerHTML = "";
            productArray.forEach(product => {
                const div = document.createElement("div");
                div.className = "product";
                div.innerHTML = `
          <span>${product.name} - ${product.price.toLocaleString()} euro</span>
          <button onclick='addToCart(${JSON.stringify(product.id)})'>➕  Add to shopping bag </button>
        `;
                productList.appendChild(div);
            });
        }
        function addToCart(id) {
            const existing = cart.find(p => p.id === id);
            if (existing) {
                existing.count++;
            } else {
                const item = products.find(p => p.id === id);
                cart.push({ ...item, count: 1 });
            }
            saveCart();
            updateCartCount();
        }
        function updateCartCount() {
            cartIcon.textContent = cart.reduce((sum, item) => sum + item.count, 0);
        }
        cartIcon.addEventListener("click", showInvoice);
        function showInvoice() {
            if (cart.length === 0) {
                alert("Your shopping cart is empty!");
                return;
            }
            invoiceList.innerHTML = "";
            let total = 0;
            cart.forEach((item, index) => {
                const li = document.createElement("li");
                li.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>${item.name}</span>
            <div>
              <button onclick="decreaseItem(${index})">➖</button>
              <strong>${item.count}</strong>
              <button onclick="increaseItem(${index})">➕</button>
              <span> × ${item.price.toLocaleString()} = 
                <strong>${(item.count * item.price).toLocaleString()} euro</strong>
              </span>
              <button onclick="removeItem(${index})">❌</button>
            </div>
          </div>
        `;
                invoiceList.appendChild(li);
                total += item.count * item.price;
            });
            totalPriceEl.textContent = total.toLocaleString();
            invoiceModal.style.display = "block";
        }
        function increaseItem(index) {
            cart[index].count++;
            saveCart();
            updateCartCount();
            showInvoice();
        }
        function decreaseItem(index) {
            if (cart[index].count > 1) {
                cart[index].count--;
            } else {
                cart.splice(index, 1);
            }
            saveCart();
            updateCartCount();
            showInvoice();
        }
        function removeItem(index) {
            cart.splice(index, 1);
            saveCart();
            updateCartCount();
            showInvoice();
            alert("Deleted")
        }
        function clearCart() {
            cart = [];
            saveCart();
            updateCartCount();
            invoiceModal.style.display = "none";
        }
        function saveCart() {
            console.log("Cart updated", cart);
        }
        renderProducts(products);
    </script>
</body>

</html>
